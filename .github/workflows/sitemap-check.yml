name: Sitemap Monitor
on:
  push:
    branches:
      - main
    paths:
      - 'main.py'
      - 'config.yaml'
      - '*.py'
      - 'requirements.txt'
  schedule:
    - cron: '0 22 * * *'  # UTC时间22点（北京时间次日6点）
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      with:
        persist-credentials: false
        
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests beautifulsoup4 python-dateutil pyyaml lxml cloudscraper

    - name: Run Monitor
      env:
        FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
      run: python main.py

    - name: Commit changes
      env:
        GH_TOKEN: ${{ secrets.GH_TOKEN }}
      run: |
        git config --global user.name "GitHub Actions"
        git config --global user.email "actions@github.com"
        git add .
        git diff --quiet && git diff --staged --quiet || (git commit -m "📦 Update sitemap data: $(date +'%Y-%m-%d')" && git push https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git)

